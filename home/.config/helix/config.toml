theme = "tokyonight"

[editor]
line-number = "absolute"
mouse = true
scrolloff = 8
cursorline = true
true-color = true
color-modes = true
bufferline = "multiple"
popup-border = "all"
default-yank-register = "+"
clipboard-provider = "pasteboard"
auto-completion = true
path-completion = true
auto-format = true
completion-trigger-len = 2
preview-completion-insert = true
auto-pairs = true
end-of-line-diagnostics = "disable"
gutters = ["diagnostics", "spacer", "line-numbers", "spacer", "diff"]

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "block"

[editor.statusline]
left = ["mode", "spinner", "file-name", "read-only-indicator", "file-modification-indicator"]
center = []
right = ["version-control", "diagnostics", "selections", "position-percentage", "position", "file-type"]
separator = ""
diagnostics = ["hint", "info", "warning", "error"]
workspace-diagnostics = ["hint", "info", "warning", "error"]

[editor.lsp]
display-messages = true
display-progress-messages = false
auto-signature-help = true
display-inlay-hints = false
display-color-swatches = true
snippets = true

[editor.file-picker]
hidden = false
git-ignore = true

[editor.file-explorer]
hidden = false

[editor.search]
smart-case = true
wrap-around = true

[editor.indent-guides]
render = true
character = "│"
skip-levels = 0

[editor.inline-diagnostics]
cursor-line = "hint"
other-lines = "disable"
prefix-len = 1
max-wrap = 20
max-diagnostics = 10

[editor.word-completion]
enable = true
trigger-length = 3

# Multicursor-ish mappings ported from nvim.
# Match maps use the current Helix selection as the search seed.
[keys.normal]
C-y = [
  ':sh rm -f /tmp/hx-yazi-chooser',
  ':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/hx-yazi-chooser',
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/hx-yazi-chooser}',
  ':redraw',
]
esc = "keep_primary_selection"
K = "hover"
H = "goto_previous_buffer"
L = "goto_next_buffer"

[keys.normal.space]
w = ":write"
q = ":quit"
o = ":oil"
x = ":buffer-close"

[keys.normal.g]
k = "copy_selection_on_prev_line"
j = "copy_selection_on_next_line"
n = ["search_selection_detect_word_boundaries", "extend_search_next"]
N = ["search_selection_detect_word_boundaries", "extend_search_prev"]
gt = ["search_selection_detect_word_boundaries", "search_next"]
lt = ["search_selection_detect_word_boundaries", "search_prev"]

[keys.select.g]
k = "copy_selection_on_prev_line"
j = "copy_selection_on_next_line"
n = ["search_selection_detect_word_boundaries", "extend_search_next"]
N = ["search_selection_detect_word_boundaries", "extend_search_prev"]
gt = ["search_selection_detect_word_boundaries", "search_next"]
lt = ["search_selection_detect_word_boundaries", "search_prev"]

[keys.select]
H = "goto_previous_buffer"
L = "goto_next_buffer"
"|" = "split_selection"
"/" = "select_regex"
I = ["split_selection_on_newline", "insert_at_line_start"]
A = ["split_selection_on_newline", "insert_at_line_end"]
